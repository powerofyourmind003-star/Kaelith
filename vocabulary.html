function getBadgeClass(type) {
  const map = {
    noun: "noun", verb: "verb", adjective: "adjective",
    adverb: "adverb", pronoun: "pronoun", preposition: "preposition",
    conjunction: "conjunction", abbreviation: "abbreviation"
  };
  return map[type] || "noun";
}
function getTypeLabel(type) {
  const labels = {
    noun: "Ot", verb: "Fe'l", adjective: "Sifat", adverb: "Ravish",
    pronoun: "Olmosh", preposition: "Old ko'makchi",
    conjunction: "Bog'lovchi", abbreviation: "Qisqartma"
  };
  return labels[type] || type;
}
function renderCards(data) {
  const grid = document.getElementById("wordGrid");
  const counter = document.getElementById("counter");
  grid.innerHTML = "";
  counter.textContent = data.length + " ta so'z";
  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">🔍 Hech narsa topilmadi</div>';
    return;
  }
  data.forEach(w => {
    const examplesHtml = w.examples.map(ex =>
      `<li>${ex}</li>`
    ).join("");
    const synonymsHtml = w.synonyms.map(s =>
      `<span class="syn-tag">${s}</span>`
    ).join("");
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header">
        <div class="word-info">
          <div class="word">${w.word}</div>
          <div class="pronunciation">${w.pronunciation}</div>
          <div class="translation">${w.translation}</div>
        </div>
        <span class="badge ${getBadgeClass(w.type)}">${getTypeLabel(w.type)}</span>
      </div>
      <div class="card-body">
        <div class="section-title">📌 Qo'llanilishi</div>
        <div class="usage">${w.usage}</div>
        <div class="section-title">💬 Misollar</div>
        <ul class="examples">${examplesHtml}</ul>
        <div class="section-title">🔗 Sinonimlar</div>
        <div class="synonyms">${synonymsHtml}</div>
      </div>
    `;
    grid.appendChild(card);
  });
}
function filterCards() {
  const query = document.getElementById("searchInput").value.toLowerCase();
  const type = document.getElementById("filterType").value;
  const filtered = words.filter(w => {
    const matchType = type === "all" || w.type === type;
    const matchSearch = !query ||
      w.word.toLowerCase().includes(query) ||
      w.translation.toLowerCase().includes(query);
    return matchType && matchSearch;
  });
  renderCards(filtered);
}
document.getElementById("searchInput").addEventListener("input", filterCards);
document.getElementById("filterType").addEventListener("change", filterCards);
renderCards(words);
</script>
</body>
</html>
